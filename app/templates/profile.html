{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <!-- Profile Card -->
        <div class="card p-4 mt-4 text-center">
            <div class="mb-3">
                <i class="fas fa-user-circle" style="font-size: 5rem; color: #00d4aa;"></i>
            </div>
            <h3 class="fw-bold">{{ current_user.username }}</h3>
            <p class="text-muted">{{ current_user.email }}</p>
            <span class="badge" style="background-color: #00d4aa;">Active Account</span>
        </div>

        <!-- Account Info -->
        <div class="card p-4 mt-4">
            <h5 class="fw-bold mb-4"><i class="fas fa-info-circle me-2" style="color: #00d4aa;"></i>Account Information</h5>
            <div class="row mb-3">
                <div class="col-5 text-muted">Username</div>
                <div class="col-7 fw-bold">{{ current_user.username }}</div>
            </div>
            <div class="row mb-3">
                <div class="col-5 text-muted">Email</div>
                <div class="col-7 fw-bold">{{ current_user.email }}</div>
            </div>
            <div class="row mb-3">
                <div class="col-5 text-muted">Watchlist</div>
                <div class="col-7 fw-bold">{{ watchlist_count }} stocks tracked</div>
            </div>
        </div>

        <!-- Change Password -->
        <div class="card p-4 mt-4">
            <h5 class="fw-bold mb-4"><i class="fas fa-lock me-2" style="color: #00d4aa;"></i>Change Password</h5>
            <form method="POST" action="/profile/change-password">
                <div class="mb-3">
                    <label class="form-label">Current Password</label>
                    <input type="password" name="current_password" class="form-control" placeholder="Enter current password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Update Password</button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
