{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2 class="section-title">My <span style="color: var(--accent);">Watchlist</span></h2>
        <p class="text-muted">Track your favorite stocks with near real-time prices.</p>
    </div>
</div>

<!-- Search Bar -->
<div class="row mb-4">
    <div class="col-md-6">
        <div class="input-group">
            <input type="text" id="stock-search" class="form-control" placeholder="Search stock symbol (e.g. AAPL, TSLA)">
            <button class="btn btn-primary" onclick="addStock()"><i class="fas fa-plus me-1"></i>Add</button>
        </div>
    </div>
</div>

<!-- Watchlist Table -->
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
        <table class="table table-hover align-middle" id="watchlist-table">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Current Price</th>
                    <th>Change</th>
                    <th>Change %</th>
                    <th>High</th>
                    <th>Low</th>
                    <th>Notes</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="watchlist-body">
                <tr id="empty-row">
                    <td colspan="8" class="text-center text-muted py-4">No stocks in your watchlist yet. Add one above!</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Chart Modal -->
<div class="modal fade" id="chartModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="chartModalTitle">Stock Chart</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <div id="tradingview-chart" style="height: 500px;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentSymbol = '';

    function loadWatchlist() {
        fetch('/api/watchlist')
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) return;
                document.getElementById('empty-row').style.display = 'none';
                data.forEach(item => fetchStockPrice(item.symbol, item.note));
            });
    }

    function fetchStockPrice(symbol, note = '') {
        fetch(`/api/stock-price?symbol=${symbol}`)
            .then(res => res.json())
            .then(data => {
                const existing = document.getElementById('row-' + symbol);
                if (existing) existing.remove();

                const change = data.d || 0;
                const changePct = data.dp || 0;
                const color = change >= 0 ? '#00d4aa' : '#dc3545';
                const arrow = change >= 0 ? '▲' : '▼';
                const noteEscaped = (note || '').replace(/"/g, '&quot;');

                const row = `
                    <tr id="row-${symbol}">
                        <td><strong style="cursor:pointer; color:#00d4aa;" onclick="openChart('${symbol}')">${symbol}</strong></td>
                        <td><strong>$${data.c ? data.c.toFixed(2) : 'N/A'}</strong></td>
                        <td style="color: ${color}">${arrow} ${Math.abs(change).toFixed(2)}</td>
                        <td style="color: ${color}">${changePct.toFixed(2)}%</td>
                        <td>$${data.h ? data.h.toFixed(2) : 'N/A'}</td>
                        <td>$${data.l ? data.l.toFixed(2) : 'N/A'}</td>
                        <td>
                            <input type="text" class="form-control form-control-sm note-input" data-symbol="${symbol}" value="${noteEscaped}" placeholder="Add a note..." style="min-width: 150px;">
                        </td>
                        <td><button class="btn btn-sm btn-danger" onclick="removeStock('${symbol}')">Remove</button></td>
                    </tr>`;
                document.getElementById('watchlist-body').insertAdjacentHTML('beforeend', row);
                document.getElementById('empty-row').style.display = 'none';

                const input = document.querySelector(`.note-input[data-symbol="${symbol}"]`);
                input.addEventListener('blur', () => saveNote(symbol, input.value));
            });
    }

    function saveNote(symbol, note) {
        fetch('/api/watchlist/note', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({symbol: symbol, note: note})
        });
    }

    function openChart(symbol) {
        currentSymbol = symbol;
        document.getElementById('chartModalTitle').textContent = symbol + ' Price Chart';
        new bootstrap.Modal(document.getElementById('chartModal')).show();

        document.getElementById('tradingview-chart').innerHTML = '';

        new TradingView.widget({
            "container_id": "tradingview-chart",
            "symbol": symbol,
            "width": "100%",
            "height": 500,
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light',
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "studies": ["MASimple@tv-basicstudies"]
        });
    }

    function addStock() {
        const symbol = document.getElementById('stock-search').value.toUpperCase().trim();
        if (!symbol) return alert('Please enter a stock symbol!');

        fetch('/api/watchlist/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({symbol: symbol})
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                fetchStockPrice(symbol);
                document.getElementById('stock-search').value = '';
            } else {
                alert(data.message);
            }
        });
    }

    function removeStock(symbol) {
        fetch('/api/watchlist/remove', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({symbol: symbol})
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById('row-' + symbol).remove();
                if (document.getElementById('watchlist-body').children.length === 1) {
                    document.getElementById('empty-row').style.display = '';
                }
            }
        });
    }

    setInterval(() => {
        fetch('/api/watchlist')
            .then(res => res.json())
            .then(data => data.forEach(item => fetchStockPrice(item.symbol, item.note)));
    }, 30000);

    loadWatchlist();
</script>
{% endblock %}
