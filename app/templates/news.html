{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2 class="fw-bold">Financial <span style="color: #00d4aa;">News</span></h2>
        <p class="text-muted">Latest financial news from around the world.</p>
    </div>
</div>

<!-- Category Filter -->
<div class="row mb-4">
    <div class="col">
        <button class="btn btn-primary me-2 active-filter" onclick="filterNews('general')">General</button>
        <button class="btn btn-outline-secondary me-2" onclick="filterNews('forex')">Forex</button>
        <button class="btn btn-outline-secondary me-2" onclick="filterNews('crypto')">Crypto</button>
        <button class="btn btn-outline-secondary" onclick="filterNews('merger')">Mergers</button>
    </div>
</div>

<!-- News Cards -->
<div id="news-container" class="row g-4">
    <div class="col-12 text-center py-5">
        <div class="spinner-border" style="color: #00d4aa;" role="status"></div>
        <p class="mt-3 text-muted">Loading news...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentCategory = 'general';

    function filterNews(category) {
        currentCategory = category;
        document.querySelectorAll('.row .btn').forEach(btn => {
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-outline-secondary');
        });
        event.target.classList.remove('btn-outline-secondary');
        event.target.classList.add('btn-primary');
        loadNews(category);
    }

    function loadNews(category) {
        const container = document.getElementById('news-container');
        container.innerHTML = `
            <div class="col-12 text-center py-5">
                <div class="spinner-border" style="color: #00d4aa;" role="status"></div>
                <p class="mt-3 text-muted">Loading news...</p>
            </div>`;

        fetch(`/api/news?category=${category}`)
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center py-5"><p class="text-muted">No news available.</p></div>';
                    return;
                }
                container.innerHTML = data.map(article => `
                    <div class="col-md-4">
                        <div class="card h-100">
                            ${article.image ? `<img src="${article.image}" class="card-img-top" style="height: 180px; object-fit: cover;" onerror="this.style.display='none'">` : ''}
                            <div class="card-body">
                                <span class="badge mb-2" style="background-color: #00d4aa;">${article.source}</span>
                                <h6 class="card-title fw-bold">${article.headline}</h6>
                                <p class="card-text text-muted small">${article.summary ? article.summary.substring(0, 100) + '...' : ''}</p>
                            </div>
                            <div class="card-footer d-flex justify-content-between align-items-center">
                                <small class="text-muted">${new Date(article.datetime * 1000).toLocaleDateString()}</small>
                                <a href="${article.url}" target="_blank" class="btn btn-sm btn-outline-secondary">Read More</a>
                            </div>
                        </div>
                    </div>
                `).join('');
            })
            .catch(() => {
                container.innerHTML = '<div class="col-12 text-center py-5"><p class="text-danger">Failed to load news.</p></div>';
            });
    }

    loadNews('general');
</script>
{% endblock %}
