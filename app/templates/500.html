{% extends "base.html" %}

{% block content %}
<div class="text-center py-5">
    <i class="fas fa-exclamation-triangle" style="font-size: 5rem; color: #dc3545;"></i>
    <h1 class="fw-bold mt-4" style="font-size: 6rem; color: #dc3545;">500</h1>
    <h3 class="fw-bold">Internal Server Error</h3>
    <p class="text-muted mt-3">Something went wrong on our end. Please try again later.</p>
    {% if current_user.is_authenticated %}
        <a href="/dashboard" class="btn btn-primary mt-3">Back to Dashboard</a>
    {% else %}
        <a href="/" class="btn btn-primary mt-3">Back to Home</a>
    {% endif %}
</div>
{% endblock %}
