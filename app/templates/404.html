{% extends "base.html" %}

{% block content %}
<div class="text-center py-5">
    <i class="fas fa-search" style="font-size: 5rem; color: #00d4aa;"></i>
    <h1 class="fw-bold mt-4" style="font-size: 6rem; color: #00d4aa;">404</h1>
    <h3 class="fw-bold">Page Not Found</h3>
    <p class="text-muted mt-3">Oops! The page you're looking for doesn't exist.</p>
    {% if current_user.is_authenticated %}
        <a href="/dashboard" class="btn btn-primary mt-3">Back to Dashboard</a>
    {% else %}
        <a href="/" class="btn btn-primary mt-3">Back to Home</a>
    {% endif %}
</div>
{% endblock %}
